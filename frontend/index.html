<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Tutor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">

    <header>
      <!-- Tab switcher -->
      <div class="tabs">
        <button class="tab active" data-tab="tutor">tutor</button>
        <button class="tab" data-tab="doc">doc</button>
      </div>
      <div class="controls">
        <select id="language-select">
          <option value="portuguese">Português</option>
          <option value="spanish">Español</option>
          <option value="hindi">Hindi</option>
          <option value="punjabi">Panjabi (WIP)</option>
        </select>
        <button id="reset-btn" aria-label="Reset conversation">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/>
            <path d="M3 3v5h5"/>
          </svg>
          Reset
        </button>
      </div>
    </header>

    <!-- Shared: waveform -->
    <div class="voice-section">
      <canvas id="waveform"></canvas>
      <div class="voice-meta">
        <div id="state-label" class="state-label">idle</div>
        <button id="stop-btn" class="stop-btn hidden" aria-label="Stop audio">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor">
            <rect x="4" y="4" width="16" height="16" rx="2"/>
          </svg>
          Stop
        </button>
      </div>
    </div>

    <!-- Shared: talk button -->
    <div class="talk-area">
      <button id="talk-btn" class="talk-btn" aria-label="Hold to speak">
        <div class="talk-ring"></div>
        <div class="talk-core">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="2" width="6" height="11" rx="3"/>
            <path d="M5 10a7 7 0 0 0 14 0"/>
            <line x1="12" y1="19" x2="12" y2="22"/>
            <line x1="8" y1="22" x2="16" y2="22"/>
          </svg>
        </div>
      </button>
    </div>

    <div class="talk-hint-row">
      <span class="talk-hint">hold to speak</span>
    </div>

    <!-- ── TUTOR TAB CONTENT ─────────────────────── -->
    <div class="tutor-content">
      <div class="context-bar">
        <input type="file" id="file-input" accept="image/*,.pdf,.txt,.md" hidden />
        <div id="attachment-bar" class="attachment-bar hidden">
          <div id="attachment-chip" class="attachment-chip">
            <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
            <span id="attachment-name"></span>
            <button id="attachment-remove" aria-label="Remove attachment">
              <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
          </div>
        </div>
        <div class="context-input-row">
          <button id="attach-btn" class="attach-btn-inline" aria-label="Attach file">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.41 17.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <input type="text" id="text-context" class="context-input" placeholder="Add context, links, or notes…" autocomplete="off" />
        </div>
      </div>
    </div>

    <!-- ── DOC TAB CONTENT ──────────────────────── -->
    <div class="doc-content hidden">

      <!-- Input method toggle -->
      <div class="doc-method-row">
        <button class="method-btn active" data-method="text">Text</button>
        <button class="method-btn" data-method="file">File</button>
        <button class="method-btn" data-method="url">URL</button>
      </div>

      <!-- Text input -->
      <div class="doc-input-area" data-input="text">
        <textarea id="doc-text" placeholder="Paste article or text here…"></textarea>
      </div>

      <!-- File input -->
      <div class="doc-input-area hidden" data-input="file">
        <input type="file" id="doc-file" accept=".pdf,.txt,.md" hidden />
        <div class="doc-file-zone" id="doc-file-zone">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="color:var(--text-muted)">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/>
          </svg>
          <span id="doc-file-label" class="doc-file-label">Click to select — PDF, TXT, or MD</span>
        </div>
      </div>

      <!-- URL input -->
      <div class="doc-input-area hidden" data-input="url">
        <input type="text" id="doc-url" class="doc-url-input" placeholder="https://…" autocomplete="off" />
        <p class="doc-url-note">Works for most free articles. Paywalled sites won't load.</p>
      </div>

      <!-- Analysis type checkboxes -->
      <div class="analysis-types">
        <label><input type="checkbox" value="summary" checked /> Summary</label>
        <label><input type="checkbox" value="vocab" /> Key vocab</label>
        <label><input type="checkbox" value="analysis" /> Analysis</label>
      </div>

      <!-- Analyze button -->
      <button id="analyze-btn">Analyze</button>

    </div>

    <!-- Shared: corrections + transcript -->
    <div class="bottom-section">
      <div id="corrections-panel" class="corrections-panel hidden">
        <div class="corrections-header">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 9v4m0 4h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
          Corrections
        </div>
        <ul id="corrections-list"></ul>
      </div>
      <div id="transcript" class="transcript"></div>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
